when:
  - event: push
  - event: pull_request

steps:
  test:
    image: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y --no-install-recommends libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 libfontconfig1
      - pip install -e .[dev]
      - ruff check .
      - QT_QPA_PLATFORM=offscreen pytest -q
