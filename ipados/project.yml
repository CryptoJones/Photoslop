name: Photoslop-iPadOS

options:
  bundleIdPrefix: io.ronin48
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CURRENT_PROJECT_VERSION: "13000"
    MARKETING_VERSION: "1.30.0"

targets:
  PhotoslopIPad:
    type: application
    platform: iOS
    productName: Photoslop
    sources:
      - path: Photoslop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.ronin48.photoslop.ipad
        PRODUCT_NAME: Photoslop
        PRODUCT_MODULE_NAME: PhotoslopIPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "2"
    info:
      path: Photoslop/Info.plist
      properties:
        CFBundleDisplayName: Photoslop
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.graphics-design
        LSSupportsOpeningDocumentsInPlace: true
        NSPhotoLibraryUsageDescription: Photoslop imports images you choose for editing.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false

  PhotoslopIPadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PhotoslopTests
    dependencies:
      - target: PhotoslopIPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.ronin48.photoslop.ipad.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "2"

schemes:
  PhotoslopIPad:
    build:
      targets:
        PhotoslopIPad: all
        PhotoslopIPadTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - PhotoslopIPadTests
    archive:
      config: Release
