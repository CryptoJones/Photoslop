name: portable

on:
  workflow_dispatch:
    inputs:
      verify_macos_signing:
        description: Import the protected Developer ID identity and sign the macOS validation artifact
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - "photoslop/**"
      - "scripts/build-portable-*"
      - "scripts/generate-bundle-metadata.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/portable.yml"
  schedule:
    - cron: "23 6 * * 1"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    env:
      PHOTOSLOP_REQUIRE_SIGNING: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.verify_macos_signing)) && '1' || '0' }}
      # v1.30.0 is Developer ID signed but is not notarized. Later tags remain
      # fail-closed until the notary credentials are configured.
      PHOTOSLOP_REQUIRE_NOTARIZATION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name != 'v1.30.0' && '1' || '0' }}
      PHOTOSLOP_ARTIFACT_QUALIFIER: ${{ (github.ref_name == 'v1.30.0' || (github.event_name == 'workflow_dispatch' && inputs.verify_macos_signing)) && 'SIGNED-NOT-NOTARIZED' || '' }}
      PHOTOSLOP_APPLE_ID: ${{ secrets.PHOTOSLOP_APPLE_ID }}
      PHOTOSLOP_APPLE_TEAM_ID: ${{ secrets.PHOTOSLOP_APPLE_TEAM_ID }}
      PHOTOSLOP_APPLE_APP_PASSWORD: ${{ secrets.PHOTOSLOP_APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: python scripts/check-version.py
      - name: Import Developer ID identity
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.verify_macos_signing)
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: ./scripts/import-macos-signing-certificate.sh
      - run: ./scripts/build-portable-macos.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Photoslop-macOS-portable${{ github.ref_name == 'v1.30.0' && '-SIGNED-NOT-NOTARIZED' || '' }}
          path: |
            dist/portable-macos/*.zip
            dist/portable-macos/*.sha256
            dist/portable-macos/*.json
            dist/portable-macos/THIRD_PARTY_NOTICES.md
      - name: Remove temporary signing keychain
        if: always() && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.verify_macos_signing))
        run: security delete-keychain "$RUNNER_TEMP/photoslop-signing.keychain-db" 2>/dev/null || true

  windows:
    runs-on: windows-latest
    env:
      # v1.30.0 is a maintainer-approved Windows-only unsigned exception.
      PHOTOSLOP_REQUIRE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name != 'v1.30.0' && '1' || '0' }}
      PHOTOSLOP_ARTIFACT_QUALIFIER: ${{ github.ref_name == 'v1.30.0' && 'UNSIGNED' || '' }}
      PHOTOSLOP_WINDOWS_CERT_BASE64: ${{ secrets.PHOTOSLOP_WINDOWS_CERT_BASE64 }}
      PHOTOSLOP_WINDOWS_CERT_PASSWORD: ${{ secrets.PHOTOSLOP_WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: python scripts/check-version.py
      - shell: pwsh
        run: ./scripts/build-portable-windows.ps1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Photoslop-Windows-portable${{ github.ref_name == 'v1.30.0' && '-UNSIGNED' || '' }}
          path: |
            dist/portable-windows/*.zip
            dist/portable-windows/*.sha256
            dist/portable-windows/*.json
            dist/portable-windows/THIRD_PARTY_NOTICES.md

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Photoslop-macOS-portable${{ github.ref_name == 'v1.30.0' && '-SIGNED-NOT-NOTARIZED' || '' }}
          path: dist/macos
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Photoslop-Windows-portable${{ github.ref_name == 'v1.30.0' && '-UNSIGNED' || '' }}
          path: dist/windows
      - name: Give platform metadata unique release names
        run: |
          mv dist/macos/photoslop.cdx.json dist/macos/Photoslop-macOS.cdx.json
          mv dist/macos/BUILD-IDENTITY.json dist/macos/Photoslop-macOS-BUILD-IDENTITY.json
          mv dist/macos/THIRD_PARTY_NOTICES.md dist/macos/Photoslop-macOS-THIRD_PARTY_NOTICES.md
          mv dist/windows/photoslop.cdx.json dist/windows/Photoslop-Windows.cdx.json
          mv dist/windows/BUILD-IDENTITY.json dist/windows/Photoslop-Windows-BUILD-IDENTITY.json
          mv dist/windows/THIRD_PARTY_NOTICES.md dist/windows/Photoslop-Windows-THIRD_PARTY_NOTICES.md
      - name: Attest portable archive provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/**/*.zip"
      - name: Attach portable builds and metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}"
          dist/macos/* dist/windows/* --clobber
