name: iPadOS

on:
  pull_request:
    paths:
      - "ipados/**"
      - "scripts/build-ipados.sh"
      - ".github/workflows/ipados.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify release versions
        run: python3 scripts/check-version.py
      - name: Install XcodeGen
        run: |
          archive="$RUNNER_TEMP/xcodegen.zip"
          curl --fail --location --silent --show-error \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.46.0/xcodegen.zip \
            --output "$archive"
          echo "4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806  $archive" \
            | shasum -a 256 -c -
          mkdir "$RUNNER_TEMP/xcodegen-release"
          ditto -x -k "$archive" "$RUNNER_TEMP/xcodegen-release"
          echo "XCODEGEN=$RUNNER_TEMP/xcodegen-release/xcodegen/bin/xcodegen" \
            >> "$GITHUB_ENV"
      - name: Build iPadOS app
        run: scripts/build-ipados.sh
      - name: Select iPad simulator
        id: simulator
        run: |
          DEVICE_ID="$(xcrun simctl list devices available -j | jq -r \
            '[.devices[][] | select(.name | startswith("iPad"))][0].udid')"
          test -n "$DEVICE_ID" -a "$DEVICE_ID" != "null"
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
      - name: Run iPadOS tests
        working-directory: ipados
        run: |
          xcodebuild \
            -project Photoslop-iPadOS.xcodeproj \
            -scheme PhotoslopIPad \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}' \
            CODE_SIGNING_ALLOWED=NO \
            test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Photoslop-iPadOS-unsigned-validation-only
          path: ipados/dist/Photoslop-iPadOS-unsigned.zip
