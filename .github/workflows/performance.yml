name: full-scale-performance

on:
  schedule:
    - cron: "17 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Linux Qt runtime libraries
        run: scripts/install-ci-qt-linux.sh
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --locked
      - name: Full-resolution latency, memory, output, and cancellation gates
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mkdir -p reports
          uv run python -m photoslop.benchmarks 4k-10 \
            --samples 5 --enforce > reports/full-4k-10.json
          uv run python -m photoslop.benchmarks 12mp-4 \
            --samples 5 --enforce > reports/full-12mp-4.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: full-scale-performance-${{ github.sha }}
          path: reports/
