name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 libfontconfig1
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: |
          mkdir -p reports
          QT_QPA_PLATFORM=offscreen uv run pytest -q --junitxml=reports/tests.xml
      - name: Deterministic benchmark reports
        run: |
          QT_QPA_PLATFORM=offscreen uv run python -m photoslop.benchmarks 4k-50 --scale 0.01 --samples 5 > reports/benchmark-4k-50.json
          QT_QPA_PLATFORM=offscreen uv run python -m photoslop.benchmarks 12k-20 --scale 0.01 --samples 5 > reports/benchmark-12k-20.json
      - name: Publish verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-${{ github.sha }}
          path: reports/
